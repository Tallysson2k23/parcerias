<!DOCTYPE html>
<html>
<head>
  <title>Painel Cliente</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
    }

    header {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    h3 {
      margin-bottom: 20px;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
    }

    /* CARD QUADRADO */
    .card {
      position: relative;
      border-radius: 15px;
      overflow: hidden;
      cursor: pointer;
      height: 160px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Overlay escuro */
    .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
      color: white;
    }

    .nome {
      font-weight: bold;
      font-size: 16px;
    }

    .desconto {
      font-size: 13px;
      color: #00ff99;
    }

    /* Código */
    .codigo-area {
      margin-top: 30px;
      text-align: center;
      display: none;
    }

    .codigo-box {
      background: #2a5298;
      color: white;
      font-size: 32px;
      padding: 20px;
      border-radius: 12px;
      letter-spacing: 6px;
      margin-top: 10px;
      animation: aparecer 0.4s ease-in-out;
    }

    @keyframes aparecer {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .btn-sair {
      margin-top: 30px;
      width: 100%;
      padding: 12px;
      border: none;
      background: #e74c3c;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-sair:hover {
      background: #c0392b;
    }

  </style>
</head>

<body>

<header>
  <div>Clube de Descontos</div>
  <div id="boasVindas" style="font-size:14px; margin-top:5px;"></div>
</header>


<div class="container">

  <h3>Escolha um parceiro:</h3>

  <div class="grid">

    <!-- AUTO PLANOS -->
    <div class="card" onclick="gerarCodigo('AutoPlanos')">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQq0OV0ohPM9W3pwZWpQqgtiRgBXpGGnhkcGg&s" alt="Auto Planos">
      <div class="overlay">
        <div class="nome">Auto Planos</div>
        <div class="desconto">5% OFF</div>
      </div>
    </div>

    <!-- PAPO10 -->
    <div class="card" onclick="gerarCodigo('Papo10')">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQZBa2iSYIqW7oHzkNllKSpFbkrFxNVsBo9zw&s" alt="Papo10">
      <div class="overlay">
        <div class="nome">Papo10</div>
        <div class="desconto">5% OFF</div>
      </div>
    </div>

    <!-- POSTO ATUAL -->
    <div class="card" onclick="gerarCodigo('PostoAtual')">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT6_uJCWi0IoJT473ET1FeVvB1NhMtsamwAsg&s" alt="Posto Atual">
      <div class="overlay">
        <div class="nome">Posto Atual</div>
        <div class="desconto">5% OFF</div>
      </div>
    </div>

  </div>

  <div class="codigo-area" id="codigoArea">
    <h3>Apresente este código:</h3>
    <div class="codigo-box" id="codigo"></div>
  </div>

  <button class="btn-sair" onclick="logout()">Sair</button>

</div>
<script type="module">
import { db } from "./firebase.js";
import { 
  collection, 
  addDoc, 
  serverTimestamp,
  doc,
  getDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


// 🔥 Carregar nome do cliente ao abrir a página
window.addEventListener("DOMContentLoaded", async () => {

  const cpf = localStorage.getItem("cpf");

  if (!cpf) {
    window.location.href = "index.html";
    return;
  }

  const docRef = doc(db, "clientes", cpf);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    const nome = docSnap.data().nome;
    document.getElementById("boasVindas").innerText = 
      "Olá, " + nome + " 👋";
  } else {
    window.location.href = "index.html";
  }

});


// 🔥 Gerar código
window.gerarCodigo = async function(parceiro) {

  const cpf = localStorage.getItem("cpf");

  if (!cpf) {
    window.location.href = "index.html";
    return;
  }

  const codigo = Math.floor(100000 + Math.random() * 900000).toString();

  await addDoc(collection(db, "codigos"), {
    codigo: codigo,
    cpf: cpf,
    parceiro: parceiro,
    status: "pendente",
    criadoEm: serverTimestamp()
  });

  document.getElementById("codigo").innerText = codigo;
  document.getElementById("codigoArea").style.display = "block";
}


// 🔥 Logout
window.logout = function() {
  localStorage.removeItem("cpf");
  window.location.href = "index.html";
}
</script>


</body>
</html>
