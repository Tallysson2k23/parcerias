<!DOCTYPE html>
<html>
<head>
  <title>Clube de Descontos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 15px;
      width: 350px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      text-align: center;
      animation: fadeIn 0.6s ease-in-out;
    }

    h2 {
      margin-bottom: 25px;
      color: #1e3c72;
    }

    .tipo-selector {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      background: #f0f0f0;
      border-radius: 30px;
      padding: 5px;
    }

    .tipo-selector button {
      flex: 1;
      border: none;
      padding: 10px;
      border-radius: 30px;
      cursor: pointer;
      background: transparent;
      font-weight: bold;
      transition: 0.3s;
    }

    .ativo {
      background: #2a5298 !important;
      color: white;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #2a5298;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #2a5298;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-login:hover {
      background: #1e3c72;
    }

    #mensagem {
      margin-top: 10px;
      color: red;
      font-size: 14px;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(-10px);}
      to {opacity: 1; transform: translateY(0);}
    }

    @media(max-width: 400px) {
      .card {
        width: 90%;
      }
    }

  </style>
</head>

<body>

<div class="card">

  <h2>Clube de Descontos</h2>

  <div class="tipo-selector">
    <button id="btnCliente" class="ativo" onclick="selecionarTipo('cliente')">Cliente</button>
    <button id="btnParceiro" onclick="selecionarTipo('parceiro')">Parceiro</button>
  </div>

  <!-- Cliente -->
  <div id="campoCliente">
 <input type="text" id="cpf" placeholder="Digite seu CPF" maxlength="14" oninput="formatarCPF(this)">
</div>

  <!-- Parceiro -->
  <div id="campoParceiro" style="display:none;">
    <input type="email" id="email" placeholder="Digite seu Email">
    <input type="password" id="senha" placeholder="Digite sua Senha">
  </div>

  <button class="btn-login" onclick="login()">Entrar</button>

  <p id="mensagem"></p>

</div>

<script type="module">
import { db, auth } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

let tipoSelecionado = "cliente";

// 🔥 Máscara automática CPF
window.formatarCPF = function(input) {

  let valor = input.value.replace(/\D/g, ""); // remove tudo que não for número

  valor = valor.substring(0, 11); // limita a 11 números

  if (valor.length > 9) {
    valor = valor.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, "$1.$2.$3-$4");
  } 
  else if (valor.length > 6) {
    valor = valor.replace(/(\d{3})(\d{3})(\d{1,3})/, "$1.$2.$3");
  } 
  else if (valor.length > 3) {
    valor = valor.replace(/(\d{3})(\d{1,3})/, "$1.$2");
  }

  input.value = valor;
}


window.selecionarTipo = function(tipo) {

  tipoSelecionado = tipo;

  document.getElementById("mensagem").innerText = "";

  if (tipo === "cliente") {
    document.getElementById("campoCliente").style.display = "block";
    document.getElementById("campoParceiro").style.display = "none";
    document.getElementById("btnCliente").classList.add("ativo");
    document.getElementById("btnParceiro").classList.remove("ativo");
  } else {
    document.getElementById("campoCliente").style.display = "none";
    document.getElementById("campoParceiro").style.display = "block";
    document.getElementById("btnParceiro").classList.add("ativo");
    document.getElementById("btnCliente").classList.remove("ativo");
  }
}

window.login = async function() {

  if (tipoSelecionado === "cliente") {

    const cpf = document.getElementById("cpf").value;

    if (!cpf) {
      document.getElementById("mensagem").innerText = "Digite o CPF!";
      return;
    }

    const docRef = doc(db, "clientes", cpf);
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {
      localStorage.setItem("cpf", cpf);
      window.location.href = "cliente.html";
    } else {
      document.getElementById("mensagem").innerText = "CPF não encontrado!";
    }

  } else {

    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    if (!email || !senha) {
      document.getElementById("mensagem").innerText = "Preencha email e senha!";
      return;
    }

    try {
      await signInWithEmailAndPassword(auth, email, senha);
      window.location.href = "parceiro.html";
    } catch (error) {
      document.getElementById("mensagem").innerText = "Email ou senha inválidos!";
    }
  }
}
</script>

</body>
</html>
